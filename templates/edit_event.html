{% extends "base.html" %}
{% block title %}Edit {{ event.name }} — SOM Event OS{% endblock %}

{% block topbar %}
<div class="topbar">
  <h2>Edit event</h2>
</div>
{% endblock %}

{% block content %}
<div class="card" style="border-left: 3.5px solid var(--accent); max-width: 680px;">
  <h2 style="margin-bottom:.25rem;">Edit event</h2>
  <p class="muted text-sm mb-2">Update the details for <strong>{{ event.name }}</strong>.</p>
  <form method="post" action="{{ url_for('edit_event_route', event_id=event.id) }}">
    <div class="form-row">
      <div class="field" style="flex:1;min-width:200px;">
        <label for="name">Event name</label>
        <input type="text" id="name" name="name" required value="{{ event.name }}">
      </div>
      <div class="field" style="width:180px;">
        <label for="date">Date</label>
        <input type="date" id="date" name="date" required value="{{ event.date }}">
      </div>
      <div class="field" style="width:180px;">
        <label for="audience_type">Audience</label>
        <select id="audience_type" name="audience_type" required>
          {% for opt in ["Students","Faculty","Alumni","Industry partners","General public"] %}
          <option value="{{ opt }}" {% if event.audience_type == opt %}selected{% endif %}>{{ opt }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="field">
      <label for="description">Description</label>
      <textarea id="description" name="description">{{ event.description }}</textarea>
    </div>
    <div style="display:flex;gap:.5rem;">
      <button type="submit" class="btn btn-primary">Save changes</button>
      <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
