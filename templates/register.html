{% extends "base.html" %}
{% block title %}Register — SOM Event OS{% endblock %}
{% block topbar %}{% endblock %}
{% block content %}
<div class="auth-center">
  <div class="card" style="box-shadow: var(--shadow-lg);">
    <h2 style="margin-bottom:.25rem;">Create account</h2>
    <p class="muted text-sm mb-2">Join your team&rsquo;s event workspace.</p>
    <form method="post" action="{{ url_for('register') }}">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      <div class="field">
        <label for="display_name">Display name</label>
        <input type="text" id="display_name" name="display_name" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Register</button>
    </form>
    <p class="text-sm muted" style="margin-top:1rem;text-align:center;">
      <a href="{{ url_for('login') }}">Back to sign in</a>
    </p>
  </div>
</div>
{% endblock %}
