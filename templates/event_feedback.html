<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — {{ event.name }} · SOM Event OS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/som-theme.css') }}">
  <style>
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    .fb-shell { max-width: 540px; width: 100%; }
    .fb-card {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.25rem;
      box-shadow: var(--shadow-lg);
    }
    .fb-brand {
      display: flex; align-items: center; gap: .65rem;
      justify-content: center; margin-bottom: 1.25rem;
    }
    .fb-brand .brand-mark { width: 36px; height: 36px; font-size: .95rem; }
    .fb-brand-name {
      font-family: var(--font-display); font-weight: 700;
      font-size: .95rem; letter-spacing: -.01em;
    }
    .fb-brand-sub {
      font-family: var(--font-mono); font-size: .65rem;
      text-transform: uppercase; letter-spacing: .14em;
      color: var(--text-secondary); margin-top: .1rem;
    }
    .fb-header { text-align: center; margin-bottom: 1.75rem; }
    .fb-header h1 {
      font-family: var(--font-display);
      font-size: 1.5rem; font-weight: 700;
      letter-spacing: -.02em; line-height: 1.2;
    }
    .fb-header p {
      color: var(--text-secondary); font-size: .9rem;
      margin-top: .35rem;
    }
    .fb-field { margin-bottom: 1.25rem; }
    .fb-field label {
      display: block; font-size: .82rem; font-weight: 600;
      margin-bottom: .4rem; color: var(--text-strong);
      letter-spacing: -.005em;
    }
    .fb-field input, .fb-field textarea { width: 100%; }
    .fb-field textarea { resize: vertical; min-height: 88px; }
    .stars {
      display: flex; gap: .35rem;
      flex-direction: row-reverse;
      justify-content: flex-end;
    }
    .stars input { display: none; }
    .stars label {
      font-size: 2rem; color: var(--border-strong);
      cursor: pointer; transition: color .15s;
      line-height: 1;
    }
    .stars input:checked ~ label,
    .stars label:hover,
    .stars label:hover ~ label { color: var(--accent); }
    .yn-group { display: flex; gap: .5rem; }
    .yn-btn {
      flex: 1; padding: .65rem;
      text-align: center; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .88rem; font-weight: 600;
      cursor: pointer; transition: all .15s;
      background: var(--surface-elevated);
      color: var(--text);
      font-family: var(--font-body);
    }
    .yn-btn:hover { border-color: var(--accent); color: var(--accent); }
    .yn-btn.active {
      background: var(--text-strong); color: #FFF;
      border-color: var(--text-strong);
    }
    .fb-thanks {
      text-align: center; padding: 1.5rem 0;
    }
    .fb-thanks-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: #FFF;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 700;
      margin-bottom: .85rem;
      box-shadow: var(--shadow-md);
    }
    .fb-thanks h2 {
      font-family: var(--font-display);
      font-size: 1.4rem; font-weight: 700;
      color: var(--text-strong);
    }
    .fb-thanks p {
      color: var(--text-secondary);
      margin-top: .5rem; font-size: .92rem;
    }
  </style>
</head>
<body>
<div class="fb-shell">
  <div class="fb-card">
    {% if submitted %}
    <div class="fb-thanks">
      <div class="fb-thanks-icon" aria-hidden="true">&#10003;</div>
      <h2>Thank you</h2>
      <p>Your feedback for <strong>{{ event.name }}</strong> has been recorded.</p>
    </div>
    {% else %}
    <div class="fb-brand">
      <span class="brand-mark" aria-hidden="true">S</span>
      <div>
        <div class="fb-brand-name">SOM Event OS</div>
        <div class="fb-brand-sub">Attendee feedback</div>
      </div>
    </div>
    <div class="fb-header">
      <h1>{{ event.name }}</h1>
      <p>We'd love your feedback{{ ' · ' + event.date if event.date else '' }}</p>
    </div>
    <form method="post" action="{{ url_for('event_feedback', event_id=event.id) }}">
      <div class="fb-field">
        <label>Overall rating</label>
        <div class="stars">
          {% for i in range(5, 0, -1) %}
          <input type="radio" name="rating" id="star{{ i }}" value="{{ i }}"{% if i == 4 %} checked{% endif %}>
          <label for="star{{ i }}">&#9733;</label>
          {% endfor %}
        </div>
      </div>
      <div class="fb-field">
        <label for="liked">What did you enjoy?</label>
        <textarea id="liked" name="liked" placeholder="Tell us what worked well…"></textarea>
      </div>
      <div class="fb-field">
        <label for="improve">What could be improved?</label>
        <textarea id="improve" name="improve" placeholder="Any suggestions for next time…"></textarea>
      </div>
      <div class="fb-field">
        <label>Would you attend again?</label>
        <input type="hidden" name="would_attend_again" id="wouldAttendVal" value="yes">
        <div class="yn-group">
          <div class="yn-btn active" onclick="setYN(this,'yes')">Yes</div>
          <div class="yn-btn" onclick="setYN(this,'no')">No</div>
        </div>
      </div>
      <div class="fb-field">
        <label for="rname">Name <span class="muted" style="font-weight:400;">(optional)</span></label>
        <input type="text" id="rname" name="respondent_name" placeholder="Your name">
      </div>
      <div class="fb-field">
        <label for="remail">Email <span class="muted" style="font-weight:400;">(optional)</span></label>
        <input type="email" id="remail" name="respondent_email" placeholder="your@email.com">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-hero">Submit feedback</button>
    </form>
    {% endif %}
  </div>
</div>
<script>
function setYN(el, val) {
  document.getElementById('wouldAttendVal').value = val;
  el.parentElement.querySelectorAll('.yn-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
}
</script>
</body>
</html>
